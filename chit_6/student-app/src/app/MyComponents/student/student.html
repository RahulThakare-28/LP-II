<h2>Student App</h2>

<input [(ngModel)]="name" placeholder="Name">
<input [(ngModel)]="age" placeholder="Age">
<input [(ngModel)]="id" placeholder="ID (for update)">

<button (click)="addStudent()">Add</button>
<button (click)="updateStudent()">Update</button>
<button (click)="getStudents()">Show</button>

<ul>
  <li *ngFor="let s of students">
    {{s.name}} - {{s.age}}
    <button (click)="deleteStudent(s._id)">Delete</button>
  </li>
</ul>
