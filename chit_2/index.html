<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>User Registration</h2>

<form id="regForm" class="mt-4">

    <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name" required>

    <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email" required>

    <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password" required>

    <button class="btn btn-primary">Register</button>

</form>

<script>
document.getElementById("regForm").addEventListener("submit", function(e) {
    e.preventDefault();

    // Get data
    let user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    // AJAX POST (dummy API)
    fetch("https://jsonplaceholder.typicode.com/posts", {
        method: "POST",
        body: JSON.stringify(user),
        headers: {
            "Content-type": "application/json"
        }
    })
    .then(res => res.json())
    .then(data => {
        console.log("Posted:", data);
    });

    // Store in localStorage
    let users = JSON.parse(localStorage.getItem("users")) || [];
    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));

    // Redirect to next page
    window.location.href = "display.html";
});
</script>

</body>
</html>
