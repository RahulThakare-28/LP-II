<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Admin Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 10px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

        /* Cards spacing */
        .card {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center">Admin Panel</h4>
            <a href="#"  class="nav-link active bg-primary text-white"  >Dashboard</a>
            <a href="#">Students</a>
            <a href="#">Exams</a>
            <a href="#">Results</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2>Exam Management Dashboard</h2>

            <!-- Cards Section -->
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card text-bg-primary">
                        <div class="card-body">
                            <h5>Total Students</h5>
                            <h3>120</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-bg-success">
                        <div class="card-body">
                            <h5>Exams Conducted</h5>
                            <h3>15</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-bg-warning">
                        <div class="card-body">
                            <h5>Results Published</h5>
                            <h3>10</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="mt-4">
                <h4>Recent Exam Results</h4>

                <table class="table table-bordered table-striped mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Student Name</th>
                            <th>Exam</th>
                            <th>Marks</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Rahul</td>
                            <td>Math</td>
                            <td>85</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Amit</td>
                            <td>Science</td>
                            <td>78</td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Sneha</td>
                            <td>English</td>
                            <td>92</td>
                        </tr>
                    </tbody>
                </table>

            </div>

        </div>
    </div>
</div>

</body>
</html>
