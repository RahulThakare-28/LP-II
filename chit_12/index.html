<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Admin Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            height: 100vh;
            background-color: #212529;
            color: white;
            padding: 15px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #0d6efd;
        }

        .sidebar a.active {
            background-color: #0d6efd;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>College Admin</h4>
            <a href="#" class="active">Dashboard</a>
            <a href="#">Students</a>
            <a href="#">Faculty</a>
            <a href="#">Courses</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2>College Management Dashboard</h2>

            <!-- Cards -->
            <div class="row mt-4">

                <div class="col-md-4">
                    <div class="card text-bg-primary">
                        <div class="card-body">
                            <h5>Total Students</h5>
                            <h3>500</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-bg-success">
                        <div class="card-body">
                            <h5>Total Faculty</h5>
                            <h3>50</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-bg-warning">
                        <div class="card-body">
                            <h5>Total Courses</h5>
                            <h3>20</h3>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Table -->
            <div class="mt-4">
                <h4>Student List</h4>

                <table class="table table-bordered table-striped mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Year</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Rahul</td>
                            <td>IT</td>
                            <td>SE</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Amit</td>
                            <td>CS</td>
                            <td>TE</td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Sneha</td>
                            <td>ENTC</td>
                            <td>BE</td>
                        </tr>
                    </tbody>
                </table>

            </div>

        </div>
    </div>
</div>

</body>
</html>
